<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>数独同款</title>
  <meta name="theme-color" content="#0e88a0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="数独练习" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hud">
      <p class="mode-label">关卡模式 · 5星 · 2关</p>
      <div class="status-row">
        <div>
          <h1>数独练习</h1>
          <p class="subline">经典模式 / 可切换笔记</p>
        </div>
        <div class="meta-card">
          <span>耗时</span>
          <strong id="timer">00:00</strong>
        </div>
      </div>
    </header>

    <section class="board-panel">
      <div id="sudokuBoard" class="sudoku-board" aria-label="数独棋盘"></div>
    </section>

    <section class="controls">
      <div class="pad-grid">
        <div class="pad-card">
          <p class="pad-title">数字</p>
          <div id="digitPad" class="digit-pad"></div>
        </div>
        <div class="pad-card note-card">
          <div class="note-heading">
            <p class="pad-title">候选</p>
            <button id="noteToggle" class="note-toggle" type="button" aria-pressed="false">笔记关</button>
          </div>
          <div id="notePad" class="digit-pad note-pad"></div>
        </div>
      </div>

      <div class="toolbar" aria-label="工具栏">
        <button id="undoBtn" class="tool-btn" type="button" title="撤销">↶</button>
        <button id="redoBtn" class="tool-btn" type="button" title="重做">↷</button>
        <button id="hintBtn" class="tool-btn is-accent" type="button" title="提示">💡</button>
        <button id="newGameBtn" class="tool-btn" type="button" title="新游戏">⟳</button>
        <button id="eraseBtn" class="tool-btn" type="button" title="删除">⌫</button>
      </div>
    </section>

    <section class="info-strip">
      <div class="info-card">
        <span>剩余空格</span>
        <strong id="remainingCount">0</strong>
      </div>
      <div class="info-card">
        <span>错误次数</span>
        <strong id="mistakeCount">0 / 3</strong>
      </div>
    </section>

    <p id="message" class="message" aria-live="polite"></p>
  </main>

  <script src="game.js"></script>
</body>
</html>
